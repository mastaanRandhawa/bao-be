name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Sync docs folder (branch-deploy fallback)
        run: |
          rm -rf docs
          cp -r dist docs

      - name: Commit docs folder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: deploy site to docs [skip ci]'
          file_pattern: 'docs/**'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Set Pages source to GitHub Actions
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { owner, repo } = context.repo;
            try {
              await github.rest.repos.updateInformationAboutPagesSite({
                owner,
                repo,
                build_type: 'workflow',
              });
              core.info('Pages build_type set to workflow');
            } catch (error) {
              core.warning(`Could not set Pages to workflow: ${error.message}`);
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
